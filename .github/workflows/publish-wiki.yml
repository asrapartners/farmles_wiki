name: Publish Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "scripts/create_static_html.py"
      - "requirements.txt"
      - ".github/workflows/publish-wiki.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Get changed wiki files
        id: changed
        shell: bash
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD -- wiki > changed_files.txt
          else
            find wiki -type f > changed_files.txt
          fi

          echo "Changed files:"
          cat changed_files.txt

      - name: Build static HTML
        shell: bash
        run: |
          CHANGED_FILES=$(cat changed_files.txt)

          if [ -z "$CHANGED_FILES" ]; then
            python scripts/create_static_html.py --input wiki --out public
          else
            python scripts/create_static_html.py --input wiki --out public --changed $CHANGED_FILES
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
